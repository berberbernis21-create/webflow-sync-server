<!--
LOST & FOUND DELIVERY & FREIGHT CALCULATOR
PART 2 OF 2: PAGE FOOTER JAVASCRIPT

Paste this entire block into:
Page Settings > Custom Code > Before </body>

The visible HTML/CSS from Part 1 must already be on the page.
This script will run on the published Webflow staging and production sites.
-->

<script>
(function(){
  "use strict";

  const API_BASE="https://webflow-sync-server.onrender.com";
  const LOOKUP_URL=API_BASE+"/api/listing";
  const PREVIEW_URL=API_BASE+"/api/freight-quote/preview";
  const SUBMIT_URL=API_BASE+"/api/freight-quote";
  const ORIGIN_ADDRESS="15530 N Greenway Hayden Loop Ste 100, Scottsdale, AZ 85260";
  const REDIRECT_URL="https://www.lostandfoundresale.com/faq";
  const REDIRECT_DELAY_MS=4500;

  const LOCAL={baseMinutes:15,basePrice:95,referenceMinutes:8,referencePrice:15};
  let step=1,itemCounter=0,lastPreview=null,submitting=false;

  const $=(s,r=document)=>r.querySelector(s);
  const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
  const form=$("#lfForm"),itemsWrap=$("#lfItems"),template=$("#lfItemTemplate");

  function money(n){return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n)||0)}
  function num(v){const n=Number(v);return Number.isFinite(n)?n:0}
  function bool(id){return !!$(id)?.checked}
  function value(id){return ($(id)?.value||"").trim()}
  function escapeHtml(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
  function roundUp5(n){return Math.ceil(num(n)/5)*5}
  function compact(obj){Object.keys(obj).forEach(k=>{if(obj[k]===undefined||obj[k]===null||obj[k]==="")delete obj[k]});return obj}

  function classify(title){
    const t=String(title||"").toLowerCase();
    const nonstack=/(glass|mirror|artwork|art |wicker|cane|rattan|antique|fragile|marble|stone|sculpture)/.test(t);

    /*
      Do not guess a final freight class from the product title.
      Freight class can depend on the confirmed NMFC item, density,
      packaging, handling, stowability, and liability.
    */
    return {freightClass:null,nonStackable:nonstack};
  }

  function palletize(item){
    const w=num(item.width),d=num(item.depth),h=num(item.height),wt=num(item.weight);
    const selectedClass=item.freight_class===null||item.freight_class===""?null:num(item.freight_class);

    return {
      width:w<=48?48:roundUp5(w),
      depth:d<=40?40:roundUp5(d),
      height:Math.ceil(h+5),
      weight:Math.ceil(wt+30),
      freight_class:selectedClass,
      packaging_type:"Pallet(s)",
      non_stackable:!!item.non_stackable
    };
  }

  function localEstimate(minutes){
    if(!Number.isFinite(Number(minutes))||Number(minutes)<=0)return null;

    const m=Math.ceil(Number(minutes));
    const extraMinutes=Math.max(0,m-LOCAL.baseMinutes);
    const perMinuteRate=LOCAL.referencePrice/LOCAL.referenceMinutes;
    const rawEstimate=LOCAL.basePrice+(extraMinutes*perMinuteRate);
    const roundedEstimate=Math.ceil(rawEstimate/5)*5;

    return {
      drive_minutes:m,
      base_minutes:LOCAL.baseMinutes,
      base_price:LOCAL.basePrice,
      extra_minutes:extraMinutes,
      per_minute_rate:perMinuteRate,
      raw_estimate:rawEstimate,
      estimated_price:roundedEstimate
    };
  }

  function setStep(next){
    step=Math.max(1,Math.min(5,next));
    $$(".lf-step").forEach(el=>el.hidden=Number(el.dataset.step)!==step);
    $$(".lf-progress div").forEach(el=>el.classList.toggle("active",Number(el.dataset.progress)===step));
    $("#lfCalc").scrollIntoView({behavior:"smooth",block:"start"});
  }

  function fieldError(input,msg){
    input.setAttribute("aria-invalid",msg?"true":"false");
    const holder=input.closest(".lf-field");
    const error=holder?$(".lf-error",holder):null;
    if(error)error.textContent=msg||"";
  }

  function validateStep(n){
    let valid=true;
    const scope=$('.lf-step[data-step="'+n+'"]');
    if(!scope)return true;
    $$("input[required],select[required],textarea[required]",scope).forEach(input=>{
      if(input.closest(".lf-conditional")?.hidden)return;
      let msg="";
      if(input.type==="checkbox"&&!input.checked)msg="Required.";
      else if(!String(input.value||"").trim())msg="Required.";
      else if(input.type==="email"&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value))msg="Enter a valid email.";
      else if(input.name==="state"&&!/^[A-Za-z]{2}$/.test(input.value.trim()))msg="Use a two-letter state.";
      else if(input.name==="zip"&&!/^\d{5}(-\d{4})?$/.test(input.value.trim()))msg="Enter a valid ZIP code.";
      else if(input.type==="number"&&num(input.value)<=0)msg="Enter a number greater than zero.";
      fieldError(input,msg);
      if(msg)valid=false;
    });
    if(n===3&&$$(".lf-item",itemsWrap).length===0){valid=false;alert("Add at least one item.");}
    if(n===4&&bool("#lfStairs")){
      const flights=num(value("#lfFlights"));
      const stairNotes=value("#lfStairNotes");

      if(flights<1&&!stairNotes){
        valid=false;
        fieldError($("#lfFlights"),"Enter the number of flights or add a stair note.");
        fieldError($("#lfStairNotes"),"Enter a stair note or the number of flights.");
      }else{
        fieldError($("#lfFlights"),"");
        fieldError($("#lfStairNotes"),"");
      }
    }
    return valid;
  }

  function updatePathDefaults(){
    const path=$('input[name="delivery_path"]:checked')?.value||"local_az";
    if((path==="local_az"||path==="pickup_az")&&!value("#lfState"))$("#lfState").value="AZ";
    updateAddressCopy(path);
    updateAccessCopy(path);
  }

  function updateAddressCopy(path){
    const p=path||$('input[name="delivery_path"]:checked')?.value||"local_az";
    const head=$("#lfAddressHead h2");
    const help=$("#lfAddressHelp");
    const typeLabel=$("#lfTypeLabel");
    const streetLabel=$("#lfStreetLabel");
    if(p==="pickup_az"){
      if(head)head.innerHTML="Contact &amp; Pickup Address";
      if(help)help.textContent="A valid email and complete pickup address are required. Pickup must be in Arizona.";
      if(typeLabel)typeLabel.innerHTML='Pickup location <span class="lf-required">*</span>';
      if(streetLabel)streetLabel.innerHTML='Pickup street address <span class="lf-required">*</span>';
    }else{
      if(head)head.innerHTML="Contact &amp; Delivery Address";
      if(help)help.textContent="A valid email and complete delivery address are required.";
      if(typeLabel)typeLabel.innerHTML='Delivery location <span class="lf-required">*</span>';
      if(streetLabel)streetLabel.innerHTML='Street address <span class="lf-required">*</span>';
    }
  }

  function updateAccessCopy(path){
    const pickup=(path||$('input[name="delivery_path"]:checked')?.value||"local_az")==="pickup_az";
    $$(".lf-delivery-only").forEach(el=>{el.hidden=pickup});
    $$(".lf-pickup-only").forEach(el=>{el.hidden=!pickup});

    if(pickup){
      if($("#lfRoom"))$("#lfRoom").checked=false;
      if($("#lfUnpack"))$("#lfUnpack").checked=false;
    }else if($("#lfCarryOut")){
      $("#lfCarryOut").checked=false;
    }

    const setText=(sel,htmlOrText,asHtml)=>{
      const el=$(sel);
      if(!el)return;
      if(asHtml)el.innerHTML=htmlOrText;
      else el.textContent=htmlOrText;
    };

    if(pickup){
      setText("#lfInsideLabel","Inside pickup (item is inside the home or building)");
      setText("#lfDockLabel","Confirmed loading dock at pickup");
      setText("#lfCrewHelp","Lost & Found will review the item, weight, size, and access conditions. If more than two movers or a specialized pickup crew is required, the pickup price will increase and we will provide an updated estimated range for approval before scheduling.");
      setText("#lfDisassemblyLabel","Disassembly may be required to get the item out");
      setText("#lfLongCarryLabel","Long carry from entrance to the truck");
      setText("#lfLongCarryHelp","A long carry means the movers must carry the item an extended distance, generally about 75 feet or more, from the entrance, elevator, or pickup area to where the truck can park.");
      setText("#lfParkingLabel","Limited truck parking, low clearance, or restricted pickup hours");
      setText("#lfSmartDefaults","<strong>Smart defaults:</strong> Residential pickup and liftgate service are assumed. Liftgate is removed only when a confirmed loading dock is available.",true);
      setText("#lfAgreeLabel","I understand this is a preliminary estimate and final pricing must be confirmed before pickup is scheduled.");
      const notes=$("#lfNotes");
      if(notes)notes.placeholder="Share anything else the pickup team should know.";
      const summaryHelp=$("#lfSummaryHelp");
      if(summaryHelp)summaryHelp.textContent="Below are the pickup address, item information, and access details you submitted.";
      const accessHead=$('.lf-step[data-step="4"] .lf-head p');
      if(accessHead)accessHead.textContent="Tell us about stairs, interior access, building access, and handling needs for this pickup so the estimate is as accurate as possible.";
    }else{
      setText("#lfInsideLabel","Inside delivery requested");
      setText("#lfDockLabel","Confirmed loading dock at delivery");
      setText("#lfCrewHelp","Lost & Found will review the item, weight, size, and access conditions. If more than two movers or a specialized delivery crew is required, the delivery price will increase and we will provide an updated estimated range for approval before scheduling.");
      setText("#lfDisassemblyLabel","Disassembly or assembly may be required");
      setText("#lfLongCarryLabel","Long carry from truck to entrance");
      setText("#lfLongCarryHelp","A long carry means the movers must carry the item an extended distance, generally about 75 feet or more, from where the truck can park to the entrance, elevator, or delivery area.");
      setText("#lfParkingLabel","Limited truck parking, low clearance, or restricted delivery hours");
      setText("#lfSmartDefaults","<strong>Smart defaults:</strong> Residential delivery and liftgate service are assumed. Liftgate delivery is removed only when a confirmed loading dock is available.",true);
      setText("#lfAgreeLabel","I understand this is a preliminary estimate and final pricing must be confirmed before delivery or freight is scheduled.");
      const notes=$("#lfNotes");
      if(notes)notes.placeholder="Share anything else the delivery team or carrier should know.";
      const summaryHelp=$("#lfSummaryHelp");
      if(summaryHelp)summaryHelp.textContent="Below are the delivery address, item information, and access details you submitted.";
      const accessHead=$('.lf-step[data-step="4"] .lf-head p');
      if(accessHead)accessHead.textContent="Tell us about stairs, interior access, building access, and handling needs so the estimate is as accurate as possible.";
    }
  }

  function pathLabel(path){
    if(path==="pickup_az")return "Consignor Pickup";
    if(path==="nationwide")return "Nationwide Freight";
    return "Local Arizona Delivery";
  }

  function isLocalStylePath(path){
    return path==="local_az"||path==="pickup_az";
  }

  function addItem(prefill={}){
    itemCounter++;
    const node=template.content.firstElementChild.cloneNode(true);
    node.dataset.itemId=String(itemCounter);
    $(".lf-item-number",node).textContent=String($$(".lf-item",itemsWrap).length+1);

    const title=$(".lf-title",node),w=$(".lf-width",node),d=$(".lf-depth",node),h=$(".lf-height",node),wt=$(".lf-weight",node);
    title.value=prefill.title||"";w.value=prefill.width||"";d.value=prefill.depth||"";h.value=prefill.height||"";wt.value=prefill.weight||"";
    $(".lf-quantity",node).value=prefill.quantity||1;
    $(".lf-price-input",node).value=prefill.price||"";
    $(".lf-url",node).value=prefill.product_url||"";
    $(".lf-source",node).value=prefill.source||"manual";

    const auto=classify(title.value);
    const initialClass=prefill.freight_class!==undefined&&prefill.freight_class!==null
      ? String(prefill.freight_class)
      : "";
    $(".lf-class",node).value=initialClass;
    $(".lf-nonstack",node).checked=prefill.non_stackable??auto.nonStackable;

    $(".lf-remove",node).addEventListener("click",()=>{
      node.remove();renumberItems();
      if(!$$(".lf-item",itemsWrap).length)addItem();
    });

    $(".lf-lookup",node).addEventListener("click",()=>lookupItem(node));
    [title,w,d,h,wt,$(".lf-class",node),$(".lf-nonstack",node)].forEach(el=>el.addEventListener("input",()=>updatePallet(node)));
    title.addEventListener("change",()=>{
      const c=classify(title.value);
      $(".lf-nonstack",node).checked=c.nonStackable;
      updatePallet(node);
    });

    itemsWrap.appendChild(node);
    updatePallet(node);
  }

  function renumberItems(){$$(".lf-item",itemsWrap).forEach((el,i)=>$(".lf-item-number",el).textContent=String(i+1))}

  function itemFromNode(node){
    const item={
      source:$(".lf-source",node).value,
      title:$(".lf-title",node).value.trim(),
      width:num($(".lf-width",node).value),
      depth:num($(".lf-depth",node).value),
      height:num($(".lf-height",node).value),
      weight:num($(".lf-weight",node).value),
      quantity:Math.max(1,num($(".lf-quantity",node).value)||1),
      price:num($(".lf-price-input",node).value),
      product_url:$(".lf-url",node).value.trim(),
      freight_class:$(".lf-class",node).value===""?null:num($(".lf-class",node).value),
      non_stackable:$(".lf-nonstack",node).checked
    };
    item.pallet=palletize(item);
    return item;
  }

  function updatePallet(node){
    const i=itemFromNode(node),box=$(".lf-pallet",node);
    if(!i.width||!i.depth||!i.height||!i.weight){box.textContent="Enter dimensions and weight to see the SOP freight entry.";return}
    const classText=i.pallet.freight_class===null?"Class to be confirmed":"Class "+i.pallet.freight_class;
    box.innerHTML="<strong>Freight-ready entry:</strong> "+i.pallet.width+'" W × '+i.pallet.depth+'" D × '+i.pallet.height+'" H · '+i.pallet.weight+" lb · "+classText+(i.pallet.non_stackable?" · Non-stackable":"");
  }

  function extractListing(raw){
    const d=raw?.listing||raw?.product||raw?.data||raw||{};
    const dims=d.dimensions||d.dimension||d.size||"";
    let width=d.width||d.item_width||d.width_in,depth=d.depth||d.item_depth||d.depth_in,height=d.height||d.item_height||d.height_in;
    if((!width||!depth||!height)&&dims){
      const m=String(dims).replace(/[″"]/g,"").match(/([\d.]+)\s*[x×]\s*([\d.]+)\s*[x×]\s*([\d.]+)/i);
      if(m){width=width||m[1];depth=depth||m[2];height=height||m[3]}
    }
    return {
      title:d.title||d.name||d.product_name||"",
      width:num(width),depth:num(depth),height:num(height),
      weight:num(d.weight||d.estimated_weight||d.weight_lbs),
      price:num(d.price||d.product_price),
      product_url:d.url||d.link||d.product_url||d.webflow_url||"",
      freight_class:d.freight_class??d.freightClass??null
    };
  }

  async function lookupItem(node){
    const title=$(".lf-title",node).value.trim(),btn=$(".lf-lookup",node),msg=$(".lf-lookup-message",node);
    if(!title){fieldError($(".lf-title",node),"Enter the exact listing title.");return}
    btn.disabled=true;btn.innerHTML='<span class="lf-spin"></span>Looking Up';
    msg.className="lf-lookup-message";
    try{
      const res=await fetch(LOOKUP_URL+"?name="+encodeURIComponent(title),{headers:{"Accept":"application/json"}});
      const raw=await res.json().catch(()=>({}));
      if(!res.ok)throw new Error(raw.error||raw.message||"Listing not found.");
      const data=extractListing(raw);
      if(!data.width&&!data.depth&&!data.height&&!data.weight)throw new Error("The listing was found, but dimensions or weight were not returned. Please complete them manually.");
      if(data.title)$(".lf-title",node).value=data.title;
      if(data.width)$(".lf-width",node).value=data.width;
      if(data.depth)$(".lf-depth",node).value=data.depth;
      if(data.height)$(".lf-height",node).value=data.height;
      if(data.weight)$(".lf-weight",node).value=data.weight;
      if(data.price)$(".lf-price-input",node).value=data.price;
      if(data.product_url)$(".lf-url",node).value=data.product_url;
      $(".lf-source",node).value="listing";
      const c=classify(data.title||title);
      if(data.freight_class!==undefined&&data.freight_class!==null&&data.freight_class!==""){
        $(".lf-class",node).value=String(data.freight_class);
      }
      $(".lf-nonstack",node).checked=c.nonStackable;
      msg.textContent="Item found. Please review the dimensions, weight, price, and link before continuing.";
      msg.classList.add("show");
      updatePallet(node);
    }catch(err){
      msg.textContent=(err.message||"We could not find an exact match.")+" You can still enter the item manually.";
      msg.classList.add("show","bad");
      $(".lf-source",node).value="manual";
    }finally{btn.disabled=false;btn.textContent="Find Item"}
  }

  function buildPayload(){
    const path=$('input[name="delivery_path"]:checked')?.value||"local_az";
    const mode=$('input[name="request_mode"]:checked')?.value||"estimate";
    const destinationType=value("#lfType")||"residential";
    const dock=bool("#lfDock");
    const address=compact({
      street:value("#lfStreet"),unit:value("#lfUnit"),city:value("#lfCity"),
      state:value("#lfState").toUpperCase(),zip:value("#lfZip")
    });
    address.full=[address.street,address.unit,address.city,address.state,address.zip].filter(Boolean).join(", ");

    const access={
      residential:destinationType==="residential",
      commercial:destinationType==="commercial",
      dock,
      freight_elevator:bool("#lfElevator"),
      freight_elevator_notes:value("#lfElevatorNotes"),
      stairs:bool("#lfStairs"),
      stair_flights:bool("#lfStairs")?num(value("#lfFlights")):0,
      stair_notes:bool("#lfStairs")?value("#lfStairNotes"):"",
      needs_more_than_two_people:bool("#lfCrew"),
      crew_review_required:bool("#lfCrew"),
      tight_turns_or_narrow_halls:bool("#lfTight"),
      gated_access:bool("#lfGate"),
      gate_code_or_instructions:value("#lfGateCode"),
      inside_delivery:path==="pickup_az"?(bool("#lfInside")||bool("#lfCarryOut")):bool("#lfInside"),
      room_placement:path==="pickup_az"?bool("#lfCarryOut"):bool("#lfRoom"),
      unpacking_or_debris_removal:path==="pickup_az"?false:bool("#lfUnpack"),
      disassembly_or_assembly:bool("#lfDisassembly"),
      long_carry:bool("#lfLongCarry"),
      parking_or_time_restrictions:bool("#lfParking"),
      fragile_or_special_handling:bool("#lfFragile"),
      notes:value("#lfNotes"),
      liftgate_pickup:path==="pickup_az"?!dock:true,
      liftgate_delivery:path==="pickup_az"?false:!dock
    };

    return {
      request_mode:mode,
      delivery_path:path,
      customer_name:value("#lfName"),
      customer_email:value("#lfEmail"),
      customer_phone:value("#lfPhone"),
      destination_type:destinationType,
      delivery_address:address,
      street:address.street,unit:address.unit,city:address.city,state:address.state,zip:address.zip,
      origin_address:ORIGIN_ADDRESS,
      access,
      items:$$(".lf-item",itemsWrap).map(itemFromNode),
      page_url:location.href,
      submitted_at:new Date().toISOString()
    };
  }

  function accessFlags(a,isPickup){
    const flags=[];
    if(a.stairs){
      const stairParts=[];
      if(a.stair_flights>0)stairParts.push(a.stair_flights+" flight(s)");
      if(a.stair_notes)stairParts.push(a.stair_notes);
      flags.push(stairParts.length?"stairs: "+stairParts.join(" | "):"stairs");
    }
    if(a.needs_more_than_two_people)flags.push("more than two people");
    if(a.tight_turns_or_narrow_halls)flags.push("tight turns / narrow access");
    if(a.freight_elevator)flags.push("freight elevator");
    if(a.gated_access)flags.push("gated access");
    if(a.inside_delivery)flags.push(isPickup?"inside pickup":"inside delivery");
    if(a.room_placement)flags.push(isPickup?"carry-out from room / inside":"room placement");
    if(a.unpacking_or_debris_removal)flags.push("unpacking / debris removal");
    if(a.disassembly_or_assembly)flags.push(isPickup?"disassembly may be required":"assembly or disassembly");
    if(a.long_carry)flags.push("long carry");
    if(a.parking_or_time_restrictions)flags.push(isPickup?"parking or pickup-time restrictions":"parking or time restrictions");
    return flags;
  }

  function routeMapHtml(mapUrl,dirUrl){
    if(!mapUrl&&!dirUrl)return "";
    if(!mapUrl){
      return '<p><a href="'+escapeHtml(dirUrl)+'" target="_blank" rel="noopener">Open route in Google Maps</a></p>';
    }
    return '<div class="lf-route-map">'+
      '<img src="'+escapeHtml(mapUrl)+'" alt="Route map" loading="lazy" onerror="this.closest(\'.lf-route-map\').classList.add(\'is-fallback\')">'+
      '<div class="lf-route-map-fallback">Map preview unavailable right now.'+(dirUrl?' <a href="'+escapeHtml(dirUrl)+'" target="_blank" rel="noopener">Open the full route in Google Maps</a>.':'')+'</div>'+
      (dirUrl?'<a href="'+escapeHtml(dirUrl)+'" target="_blank" rel="noopener">Open in Google Maps</a>':'')+
      '</div>';
  }

  function extractDriveMinutes(data){
    const options=[
      data?.drive_minutes,data?.driveMinutes,
      data?.display?.drive_minutes,data?.display?.driveMinutes,
      data?.route?.drive_minutes,data?.route?.driveMinutes,
      data?.route?.duration_minutes,data?.route?.durationMinutes,
      data?.local_estimate?.drive_minutes,data?.localEstimate?.driveMinutes,
      data?.estimate?.drive_minutes,data?.estimate?.driveMinutes
    ];
    const found=options.find(v=>Number.isFinite(Number(v))&&Number(v)>0);
    return found===undefined?null:Number(found);
  }

  function renderSummary(payload,preview){
    const path=payload.delivery_path||"local_az";
    const pathLocal=isLocalStylePath(path);
    const isPickup=path==="pickup_az";
    const flags=accessFlags(payload.access,isPickup);
    const itemHtml=payload.items.map((i,idx)=>{
      const classText=i.pallet.freight_class===null?"Class to be confirmed":"Class "+i.pallet.freight_class;
      return '<li><strong>'+escapeHtml(i.title||("Item "+(idx+1)))+'</strong>: '+i.width+'" × '+i.depth+'" × '+i.height+'" · '+i.weight+' lb · Freight '+i.pallet.width+'" × '+i.pallet.depth+'" × '+i.pallet.height+'" · '+i.pallet.weight+' lb · '+classText+(i.pallet.non_stackable?" · Non-stackable":"")+'</li>';
    }).join("");

    const liftgateLine=isPickup
      ? ("Liftgate at pickup: "+(payload.access.liftgate_pickup?"Yes":"No | loading dock confirmed"))
      : ("Liftgate pickup: Yes · Liftgate delivery: "+(payload.access.liftgate_delivery?"Yes":"No | loading dock confirmed"));

    $("#lfSummary").innerHTML=
      '<div class="lf-summary-card"><h3>Request</h3><p><strong>'+(payload.request_mode==="please_quote"?"Have Us Quote It":"Get an Estimate")+'</strong> · '+pathLabel(path)+'</p></div>'+
      '<div class="lf-summary-card"><h3>'+(isPickup?"Pickup":"Delivery")+'</h3><p>'+escapeHtml(payload.delivery_address.full)+'</p><p>'+escapeHtml(payload.customer_name)+' · '+escapeHtml(payload.customer_email)+(payload.customer_phone?" · "+escapeHtml(payload.customer_phone):"")+'</p></div>'+
      '<div class="lf-summary-card"><h3>Items</h3><ul>'+itemHtml+'</ul></div>'+
      '<div class="lf-summary-card"><h3>Access</h3><p>'+(flags.length?escapeHtml(flags.join(", ")):"No additional access concerns reported.")+'</p><p>'+liftgateLine+'</p></div>';

    const result=$("#lfResult");
    if(pathLocal){
      const minutes=extractDriveMinutes(preview);
      const est=localEstimate(minutes);
      const manual=flags.length>0||payload.access.fragile_or_special_handling;
      const displayedAmount=est?money(est.estimated_price):"$95.00";
      const priceLabel=payload.access.needs_more_than_two_people
        ? "Approximate Two-Person Base: "
        : "Your Preliminary Estimate Is ";
      const oneWay=est?est.drive_minutes:(minutes?Math.ceil(minutes):null);
      const miles=Number(preview?.route?.distance_miles??preview?.display?.distance_miles);
      const milesText=Number.isFinite(miles)&&miles>0?" | "+miles+" mi":"";
      const driveStats=oneWay
        ? '<p class="lf-drive-stats">'+oneWay+" min one way | "+(oneWay*2)+" min round trip"+milesText+"</p>"
        : "";
      const mapUrl=preview?.route?.map_image_url||preview?.display?.map_image_url||"";
      const dirUrl=preview?.route?.directions_url||preview?.display?.directions_url||"";
      const mapHtml=routeMapHtml(mapUrl,dirUrl);
      const laborText=isPickup
        ?"Total time is calculated as a round trip, not one way. The estimate also covers preparing the freight, loading and securing it on the truck, return to the showroom, offloading, and placement."
        :"Total time is calculated as a round trip, not one way. The estimate also covers wrapping and preparing the freight, loading and securing it on the truck, offloading, and placement.";
      const policyText=isPickup
        ?'<p>Consignor pickup estimate. We will confirm scheduling and final pricing. Questions? <a href="mailto:info@lostandfoundresale.com"><strong>info@lostandfoundresale.com</strong></a> · <a href="tel:4805887006"><strong>480-588-7006</strong></a>.</p>'
        :'<p><strong>We do not hold items</strong> | we work for our consignors. Ready to buy? Purchase now and we can confirm delivery after. Want rates first? <a href="mailto:info@lostandfoundresale.com"><strong>info@lostandfoundresale.com</strong></a> · <a href="tel:4805887006"><strong>480-588-7006</strong></a>.</p>';
      const buyLinks=!isPickup?payload.items.filter(i=>i.product_url).map(i=>
        '<li><a href="'+escapeHtml(i.product_url)+'"><strong>'+escapeHtml(i.title||"View item")+'</strong></a></li>'
      ).join(""):"";

      result.innerHTML='<h2>'+(isPickup?"Your Preliminary Consignor Pickup Estimate":"Your Preliminary Local Delivery Estimate")+'</h2>'+
        '<div class="lf-price">'+priceLabel+displayedAmount+'</div>'+
        driveStats+
        mapHtml+
        '<p>'+laborText+'</p>'+
        policyText+
        (buyLinks?'<p><strong>Buy your item(s):</strong></p><ul>'+buyLinks+'</ul>':'')+
        (payload.access.needs_more_than_two_people
          ? '<p><strong>Additional crew review required:</strong> Amount above is the standard two-person base only.</p>'
          : (manual
              ? '<p><strong>Additional review needed:</strong> Stairs, tight access, long carries, or special handling may change the final price.</p>'
              : '<p>Best estimate only. Final pricing and scheduling confirmed by Lost &amp; Found Resale.</p>'));
    }else{
      const rate=preview?.nationwide_rate||{};
      const display=preview?.display||{};
      const low=Number(rate.range_low??display.range_low);
      const high=Number(rate.range_high??display.range_high);
      const hasRange=Number.isFinite(low)&&Number.isFinite(high)&&low>0&&high>=low;
      const miles=Number(rate.distance_miles??rate.route?.distance_miles??display.distance_miles??preview?.route?.distance_miles);
      const milesLine=Number.isFinite(miles)&&miles>0
        ? '<p class="lf-drive-stats">About '+miles+' miles from our Scottsdale showroom</p>'
        : '<p>Distance confirmed on review.</p>';
      const mapUrl=preview?.route?.map_image_url||display?.map_image_url||rate?.route?.map_image_url||"";
      const dirUrl=preview?.route?.directions_url||display?.directions_url||rate?.route?.directions_url||"";
      const mapHtml=routeMapHtml(mapUrl,dirUrl);
      const rangeText=hasRange?money(low)+" - "+money(high):"Freight-Ready";
      const buyLinks=payload.items.filter(i=>i.product_url).map(i=>
        '<li><a href="'+escapeHtml(i.product_url)+'"><strong>'+escapeHtml(i.title||"View item")+'</strong></a></li>'
      ).join("");
      result.innerHTML='<h2>Your Preliminary Nationwide Freight Range</h2>'+
        '<div class="lf-price">'+rangeText+'</div>'+
        milesLine+
        mapHtml+
        '<p>Based on distance, pallet size/weight, and access. <strong>Final price depends on carrier and service</strong> | can be lower; white-glove can raise it.</p>'+
        '<p>We will follow up with better rates after partner review. FreightCenter: <a href="tel:8007167608"><strong>800-716-7608</strong></a>.</p>'+
        '<p><strong>We do not hold items</strong> | ready to buy? Purchase now and confirm freight after. Want rates first? <a href="mailto:info@lostandfoundresale.com"><strong>info@lostandfoundresale.com</strong></a> · <a href="tel:4805887006"><strong>480-588-7006</strong></a>.</p>'+
        (buyLinks?'<p><strong>Buy your item(s):</strong></p><ul>'+buyLinks+'</ul>':'');
    }
    result.classList.add("show");
  }

  async function refreshPreview(){
    if(!validateStep(2)||!validateStep(3)||!validateStep(4)){setStep(!validateStep(2)?2:!validateStep(3)?3:4);return}
    const payload=buildPayload();
    const result=$("#lfResult");
    result.innerHTML="<h2>Preparing Your Estimate</h2><p>Please wait while we review the information entered.</p>";
    result.classList.add("show");
    try{
      const res=await fetch(PREVIEW_URL,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(payload)});
      const data=await res.json().catch(()=>({}));
      if(!res.ok)throw new Error(data.error||data.message||"Preview could not be completed.");
      lastPreview=data;
      renderSummary(payload,data);
    }catch(err){
      lastPreview=null;
      renderSummary(payload,{});
      showAlert((err.message||"Live preview was unavailable.")+" The request can still be emailed for review.",true);
    }
  }

  function showAlert(msg,isError){
    const a=$("#lfAlert");
    if(!a)return;
    a.textContent=msg;
    a.className="lf-alert show "+(isError?"error":"success");
  }

  function showReviewAlert(msg){
    const a=$("#lfReviewAlert");
    if(!a)return;
    a.textContent=msg||"";
    a.className=msg?"lf-alert show error":"lf-alert error";
  }

  async function reviewEstimateAndEmail(){
    if(submitting)return;

    showReviewAlert("");

    /*
      Validate every section again at the moment of submission.
      This guarantees that a valid email and complete address are present,
      even if the customer navigated backward and changed something.
    */
    if(!validateStep(2)){
      showReviewAlert("Please enter a valid email and complete delivery address.");
      setStep(2);
      return;
    }

    if(!validateStep(3)){
      showReviewAlert("Please complete the item information before requesting the estimate.");
      setStep(3);
      return;
    }

    if(!validateStep(4)){
      showReviewAlert("Please complete the access and handling information.");
      return;
    }

    if(!$("#lfReviewAgree").checked){
      showReviewAlert("Please confirm that you understand this is a preliminary estimate.");
      $("#lfReviewAgree").focus();
      return;
    }

    const payload=buildPayload();
    payload.company_website=form.elements.company_website.value;

    const btn=$("#lfReviewSubmit");
    const originalText=btn.textContent;

    submitting=true;
    btn.disabled=true;
    btn.innerHTML='<span class="lf-spin"></span>Preparing & Sending';

    let previewData=null;

    /*
      Preview first so the summary page can show the best available result.
      Preview must not send email.
    */
    try{
      const previewResponse=await fetch(PREVIEW_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify(payload)
      });

      const previewJson=await previewResponse.json().catch(()=>({}));

      if(previewResponse.ok){
        previewData=previewJson;
        lastPreview=previewJson;
      }
    }catch(previewError){
      previewData=null;
      lastPreview=null;
    }

    payload.preview=previewData||undefined;

    /*
      Final submission sends the internal notification and customer receipt.
    */
    try{
      const submitResponse=await fetch(SUBMIT_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify(payload)
      });

      const submitJson=await submitResponse.json().catch(()=>({}));

      if(!submitResponse.ok){
        throw new Error(submitJson.error||submitJson.message||"The estimate request could not be submitted.");
      }

      $("#lfReceiptEmail").textContent=payload.customer_email;
      const pickup=payload.delivery_path==="pickup_az";
      const buyerCopy=$("#lfSocialBuyerCopy");
      const pickupCopy=$("#lfSocialPickupCopy");
      if(buyerCopy)buyerCopy.hidden=pickup;
      if(pickupCopy)pickupCopy.hidden=!pickup;
      renderSummary(payload,Object.assign({},previewData||{},submitJson||{}));
      setStep(5);

      btn.textContent="Sent";
    }catch(err){
      showReviewAlert(err.message||"Something went wrong. Please try again or call 480-588-7006.");
      btn.disabled=false;
      btn.textContent=originalText;
      submitting=false;
    }
  }

  $$("[data-next]").forEach(btn=>btn.addEventListener("click",()=>{if(validateStep(step)){updatePathDefaults();setStep(step+1)}}));
  $$("[data-back]").forEach(btn=>btn.addEventListener("click",()=>setStep(step-1)));
  $("#lfAddItem").addEventListener("click",()=>addItem());
  $("#lfReviewSubmit").addEventListener("click",reviewEstimateAndEmail);
  form.addEventListener("submit",e=>e.preventDefault());
  $("#lfStairs").addEventListener("change",e=>$("#lfStairDetails").hidden=!e.target.checked);
  $("#lfElevator").addEventListener("change",e=>$("#lfElevatorDetails").hidden=!e.target.checked);
  $("#lfGate").addEventListener("change",e=>$("#lfGateDetails").hidden=!e.target.checked);
  $$('input[name="delivery_path"]').forEach(el=>el.addEventListener("change",()=>{
    const path=$('input[name="delivery_path"]:checked').value;
    if(path==="local_az"||path==="pickup_az")$("#lfState").value="AZ";
    updateAddressCopy(path);
    updateAccessCopy(path);
  }));

  updateAddressCopy();
  updateAccessCopy();
  addItem();
})();
</script>
